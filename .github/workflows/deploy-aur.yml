name: Deploy AUR

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      version:
        required: true
        type: string
      aur_repo:
        required: false
        type: string
        default: ""
      aur_branch:
        required: false
        type: string
        default: "master"
      dry_run:
        required: false
        type: boolean
        default: false
    secrets:
      AUR_PRIVATE_SSH_KEY:
        required: false
      AUR_PRIVATE_SSH_KEY_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0 or v0.2.0)"
        required: true
        type: string
      tag:
        description: "Optional tag override (e.g. v0.2.0). Defaults to v<version>."
        required: false
        type: string
      aur_repo:
        description: "AUR Git remote URL. Defaults to AUR_GIT_REPOSITORY or ssh://aur@aur.archlinux.org/gitcomet.git."
        required: false
        default: ""
        type: string
      aur_branch:
        description: "AUR branch. Defaults to AUR_GIT_BRANCH or master."
        required: false
        default: "master"
        type: string
      dry_run:
        description: "Validate and print PKGBUILD/.SRCINFO without pushing"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-aur-${{ inputs.tag || github.event.inputs.tag || inputs.version || github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish PKGBUILD and .SRCINFO to AUR
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    container:
      image: archlinux:base-devel
    steps:
      - name: Install Arch packaging tooling
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed ca-certificates ca-certificates-utils curl expect git openssh perl shadow

      - uses: actions/checkout@v6

      - name: Normalize inputs
        id: norm
        env:
          INPUT_TAG: ${{ inputs.tag }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          INPUT_AUR_REPO: ${{ inputs.aur_repo }}
          DISPATCH_AUR_REPO: ${{ github.event.inputs.aur_repo }}
          VAR_AUR_REPO: ${{ vars.AUR_GIT_REPOSITORY }}
          INPUT_AUR_BRANCH: ${{ inputs.aur_branch }}
          DISPATCH_AUR_BRANCH: ${{ github.event.inputs.aur_branch }}
          VAR_AUR_BRANCH: ${{ vars.AUR_GIT_BRANCH }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          version="${INPUT_VERSION:-${DISPATCH_VERSION:-}}"
          aur_repo="${INPUT_AUR_REPO:-${DISPATCH_AUR_REPO:-${VAR_AUR_REPO:-}}}"
          aur_branch="${INPUT_AUR_BRANCH:-${DISPATCH_AUR_BRANCH:-${VAR_AUR_BRANCH:-master}}}"
          dry_run="${INPUT_DRY_RUN:-${DISPATCH_DRY_RUN:-false}}"

          tag="$(echo "$tag" | tr -d '[:space:]')"
          version="$(echo "$version" | tr -d '[:space:]')"
          aur_repo="$(echo "$aur_repo" | tr -d '[:space:]')"
          aur_branch="$(echo "$aur_branch" | tr -d '[:space:]')"
          dry_run="$(echo "$dry_run" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"

          if [ -z "$version" ]; then
            echo "::error title=Missing version::Version is required."
            exit 1
          fi

          version="${version#v}"
          if [ -z "$tag" ]; then
            tag="v${version}"
          fi

          if [[ "$tag" != v* ]]; then
            tag="v${tag}"
          fi

          if [ "$tag" != "v${version}" ]; then
            echo "::error title=Tag/version mismatch::Tag '$tag' does not match version '$version'."
            exit 1
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "::error title=Invalid version::Expected semver like 1.2.3 or 1.2.3-rc.1."
            exit 1
          fi

          if [ -z "$aur_repo" ]; then
            aur_repo="ssh://aur@aur.archlinux.org/gitcomet.git"
          fi

          case "$aur_repo" in
            ssh://aur@aur.archlinux.org/*.git)
              aur_repo_path="${aur_repo#ssh://aur@aur.archlinux.org/}"
              ;;
            https://aur.archlinux.org/*.git)
              aur_repo_path="${aur_repo#https://aur.archlinux.org/}"
              ;;
            aur@aur.archlinux.org:*.git)
              aur_repo_path="${aur_repo#aur@aur.archlinux.org:}"
              ;;
            *)
              echo "::error title=Invalid AUR remote::aur_repo must be an AUR Git URL like ssh://aur@aur.archlinux.org/gitcomet.git."
              exit 1
              ;;
          esac

          if ! [[ "$aur_repo_path" =~ ^[^/]+\.git$ ]]; then
            echo "::error title=Invalid AUR remote::aur_repo must point to a single AUR package repository."
            exit 1
          fi

          aur_fetch_repo="https://aur.archlinux.org/${aur_repo_path}"
          aur_repo="ssh://aur@aur.archlinux.org/${aur_repo_path}"

          if [ -z "$aur_branch" ]; then
            echo "::error title=Missing AUR branch::aur_branch must not be empty."
            exit 1
          fi

          if [[ "$dry_run" != "true" && "$dry_run" != "false" ]]; then
            echo "::error title=Invalid dry_run::dry_run must be true or false."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "aur_repo=$aur_repo" >> "$GITHUB_OUTPUT"
          echo "aur_fetch_repo=$aur_fetch_repo" >> "$GITHUB_OUTPUT"
          echo "aur_branch=$aur_branch" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

      - name: Create non-root packaging user
        run: |
          set -euo pipefail
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Download release archives referenced by PKGBUILD
        env:
          TAG: ${{ steps.norm.outputs.tag }}
          VERSION: ${{ steps.norm.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/aur
          binary_name="gitcomet-v${VERSION}-linux-x86_64.tar.gz"
          source_name="gitcomet-source-v${VERSION}.tar.gz"

          curl -fL --retry 3 --retry-all-errors \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${binary_name}" \
            -o "dist/aur/${binary_name}"

          curl -fL --retry 3 --retry-all-errors \
            "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz" \
            -o "dist/aur/${source_name}"

      - name: Clone AUR repository
        env:
          AUR_FETCH_REPO: ${{ steps.norm.outputs.aur_fetch_repo }}
          AUR_BRANCH: ${{ steps.norm.outputs.aur_branch }}
        run: |
          set -euo pipefail
          rm -rf aur-repo
          git clone --depth 1 --branch "$AUR_BRANCH" "$AUR_FETCH_REPO" aur-repo
          chown -R builder:builder aur-repo dist

      - name: Update PKGBUILD and regenerate .SRCINFO
        env:
          VERSION: ${{ steps.norm.outputs.version }}
        run: |
          set -euo pipefail
          su builder -c "cd '$GITHUB_WORKSPACE' && scripts/update-aur.sh \
            --aur-dir '$GITHUB_WORKSPACE/aur-repo' \
            --version '$VERSION' \
            --binary-tar '$GITHUB_WORKSPACE/dist/aur/gitcomet-v${VERSION}-linux-x86_64.tar.gz' \
            --source-tar '$GITHUB_WORKSPACE/dist/aur/gitcomet-source-v${VERSION}.tar.gz' \
            --verify-source"

      - name: Emit dry-run summary
        if: ${{ steps.norm.outputs.dry_run == 'true' }}
        run: |
          set -euo pipefail
          {
            echo "### AUR deployment dry run"
            echo ""
            echo "- Source release: \`${{ steps.norm.outputs.tag }}\`"
            echo "- AUR repo: \`${{ steps.norm.outputs.aur_repo }}\`"
            echo "- AUR branch: \`${{ steps.norm.outputs.aur_branch }}\`"
            echo ""
            echo "PKGBUILD preview:"
            echo '```bash'
            cat aur-repo/PKGBUILD
            echo '```'
            echo ""
            echo ".SRCINFO preview:"
            echo '```ini'
            cat aur-repo/.SRCINFO
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish metadata to AUR
        if: ${{ steps.norm.outputs.dry_run != 'true' }}
        env:
          TAG: ${{ steps.norm.outputs.tag }}
          AUR_REPO: ${{ steps.norm.outputs.aur_repo }}
          AUR_BRANCH: ${{ steps.norm.outputs.aur_branch }}
          AUR_PRIVATE_SSH_KEY: ${{ secrets.AUR_PRIVATE_SSH_KEY }}
          AUR_PRIVATE_SSH_KEY_PASSPHRASE: ${{ secrets.AUR_PRIVATE_SSH_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${AUR_PRIVATE_SSH_KEY:-}" ] || [ -z "${AUR_PRIVATE_SSH_KEY_PASSPHRASE:-}" ]; then
            echo "::error title=Missing secret::Set AUR_PRIVATE_SSH_KEY and AUR_PRIVATE_SSH_KEY_PASSPHRASE to push to AUR."
            exit 1
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE/aur-repo"

          pushd aur-repo >/dev/null
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet -- PKGBUILD .SRCINFO; then
            echo "No AUR metadata changes detected; repository is already up to date."
            popd >/dev/null
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "gitcomet ${TAG}"

          install -d -m 700 "$HOME/.ssh"
          key_path="$HOME/.ssh/aur"
          known_hosts_path="$HOME/.ssh/known_hosts"
          printf '%s\n' "$AUR_PRIVATE_SSH_KEY" > "$key_path"
          chmod 600 "$key_path"
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org > "$known_hosts_path" 2>/dev/null
          if [ ! -s "$known_hosts_path" ]; then
            echo "::error title=Missing AUR host keys::Failed to fetch SSH host keys for aur.archlinux.org."
            exit 1
          fi
          chmod 600 "$known_hosts_path"

          eval "$(ssh-agent -s)"
          cleanup() {
            rm -f "$key_path"
            if [ -n "${SSH_AGENT_PID:-}" ]; then
              ssh-agent -k >/dev/null
            fi
          }
          trap cleanup EXIT

          export KEY_PATH="$key_path"
          export AUR_PRIVATE_SSH_KEY_PASSPHRASE
          expect <<'EOF'
          set timeout 30
          log_user 0
          spawn ssh-add "$env(KEY_PATH)"
          expect {
            "Enter passphrase for*" {
              send -- "$env(AUR_PRIVATE_SSH_KEY_PASSPHRASE)\r"
              exp_continue
            }
            eof
          }
          catch wait result
          exit [lindex $result 3]
          EOF

          git remote set-url --push origin "$AUR_REPO"
          ssh_cmd="ssh -F /dev/null -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$known_hosts_path"
          GIT_SSH_COMMAND="$ssh_cmd" git push origin "HEAD:${AUR_BRANCH}"
          popd >/dev/null

      - name: Emit deployment summary
        run: |
          set -euo pipefail
          {
            echo "### AUR deployment"
            echo ""
            echo "- Release: \`${{ steps.norm.outputs.tag }}\`"
            echo "- AUR repo: \`${{ steps.norm.outputs.aur_repo }}\`"
            echo "- AUR branch: \`${{ steps.norm.outputs.aur_branch }}\`"
            echo "- Dry run: \`${{ steps.norm.outputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
